<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Bot by AIVATIKA - Coming Soon</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-deep: #0A0A0B;
            --text-main: #FFFFFF;
            --text-muted: #A1A1AA;
            --accent-glow: rgba(45, 212, 191, 0.15); /* A subtle teal glow */
            --accent-color: #2DD4BF;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-deep);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            line-height: 1.7;
            font-size: 18px;
            position: relative;
        }

        /* Background Glow Effects */
        .glow-orb {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, var(--accent-glow) 0%, rgba(10, 10, 11, 0) 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: -1;
            pointer-events: none;
        }

        nav {
            padding: 40px 80px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.02em;
            text-decoration: none;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .logo span {
            color: var(--accent-color);
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 24px;
            max-width: 800px;
            margin: 0 auto;
        }

        .badge {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 6px 16px;
            border-radius: 100px;
            font-size: 14px;
            font-weight: 500;
            color: var(--accent-color);
            margin-bottom: 32px;
            letter-spacing: 0.02em;
            text-transform: uppercase;
        }

        h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 64px;
            font-weight: 600;
            line-height: 1.15;
            letter-spacing: -0.04em;
            margin-bottom: 24px;
            background: linear-gradient(to right, #FFFFFF, #A1A1AA);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 20px;
            max-width: 600px;
            margin: 0 auto 48px;
        }

        .waitlist-form {
            display: flex;
            gap: 12px;
            width: 100%;
            max-width: 480px;
            position: relative;
        }

        .waitlist-form input {
            flex: 1;
            padding: 16px 24px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.03);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            font-size: 16px;
            outline: none;
            transition: all 0.2s ease;
        }

        .waitlist-form input:focus {
            border-color: rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.05);
        }

        .waitlist-form input::placeholder {
            color: #52525B;
        }

        .waitlist-form button {
            padding: 16px 32px;
            border-radius: 8px;
            border: none;
            background: var(--text-main);
            color: var(--bg-deep);
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 16px;
            letter-spacing: -0.01em;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .waitlist-form button:hover {
            background: #E4E4E7;
            transform: translateY(-1px);
        }

        footer {
            padding: 40px;
            text-align: center;
            color: #52525B;
            font-size: 14px;
        }

        @media (max-width: 768px) {
            h1 { font-size: 48px; }
            p.subtitle { font-size: 18px; }
            nav { padding: 32px 24px; }
            .waitlist-form { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="glow-orb"></div>

    <nav>
        <a href="https://aivatika.com" class="logo">AIVATIKA <span>Bot</span></a>
    </nav>

    <main>
        <div class="badge">Coming Soon</div>
        <h1>Intelligent WhatsApp Automation</h1>
        <p class="subtitle">Transform your customer interactions with an AI-powered assistant that works around the clock. Connect, engage, and automate effortlessly.</p>
        
        <form class="waitlist-form" onsubmit="event.preventDefault(); alert('Thank you for your interest! We will notify you when we launch.');">
            <input type="email" placeholder="Enter your work email" required>
            <button type="submit">Join Waitlist</button>
        </form>
    </main>

    <footer>
        &copy; 2026 AIVATIKA. All rights reserved.
    </footer>
</body>
</html>
